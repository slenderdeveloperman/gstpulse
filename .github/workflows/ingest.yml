name: GST Foresight — Scheduled Ingest

on:
  schedule:
    # 03:00 UTC daily ≈ 08:30 IST — fresh data before Indian business hours
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Specific source to ingest (leave blank for --all)'
        required: false
        default: ''
      skip_embed:
        description: 'Skip embedding step (scrape + chunk only)'
        required: false
        default: 'false'

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write  # needed to commit latest.json back to main

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-gte-small-v1
          restore-keys: hf-gte-small-

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Run ingest pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
        run: |
          SKIP=""
          if [ "${{ github.event.inputs.skip_embed }}" = "true" ]; then
            SKIP="--skip-embed"
          fi
          if [ -n "${{ github.event.inputs.source }}" ]; then
            python3 -m gst_foresight ingest --source "${{ github.event.inputs.source }}" $SKIP
          else
            python3 -m gst_foresight ingest --all $SKIP
          fi

      - name: Generate predictions
        run: python3 -m gst_foresight predict

      - name: Commit updated predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the predictions file — never commit raw scraped data
          git add data/predictions/latest.json

          if git diff --cached --quiet; then
            echo "No prediction changes — nothing to commit"
          else
            git commit -m "chore: update predictions [skip ci]

Automated ingest run: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Show status
        run: python3 -m gst_foresight status
