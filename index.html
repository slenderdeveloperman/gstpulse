// Sunrise/sunset via NOAA solar position equation.
// All times are in UTC minutes to avoid browser-timezone ambiguity —
// rise, set, and current time are all compared in the same UTC frame.
function computeSunTimes(lat, lng) {
  const DEG = Math.PI / 180;
  const JD = Date.now() / 86400000 + 2440587.5;
  const n  = Math.round(JD - 2451545.0 - 0.0009 - lng / 360);
  const J_noon = 2451545.0 + 0.0009 + lng / 360 + n;
  const M_deg  = (357.5291 + 0.98560028 * (J_noon - 2451545)) % 360;
  const M      = M_deg * DEG;
  const C      = 1.9148 * Math.sin(M) + 0.0200 * Math.sin(2 * M) + 0.0003 * Math.sin(3 * M);
  const lam    = ((M_deg + C + 102.9372 + 180) % 360) * DEG;
  const J_trans = J_noon + 0.0053 * Math.sin(M) - 0.0069 * Math.sin(2 * lam);
  const sin_d  = Math.sin(lam) * Math.sin(23.4397 * DEG);
  const cos_d  = Math.cos(Math.asin(sin_d));
  const cos_ha = (Math.sin(-0.8333 * DEG) - Math.sin(lat * DEG) * sin_d) / (Math.cos(lat * DEG) * cos_d);
  if (cos_ha < -1) return { rise: 0, set: 1440 };
  if (cos_ha >  1) return { rise: 720, set: 720 };
  const ha_deg = Math.acos(cos_ha) / DEG;
  // toUTC: convert Julian Day → UTC minutes since midnight. Explicit UTC avoids
  // browser timezone mismatches (VPN, wrong system clock, non-IST browsers).
  const toUTC = jd => { const d = new Date((jd - 2440587.5) * 86400000); return d.getUTCHours() * 60 + d.getUTCMinutes(); };
  return { rise: toUTC(J_trans - ha_deg / 360), set: toUTC(J_trans + ha_deg / 360) };
}
function isDayTime(lat = 20, lng = 78) {
  const { rise, set } = computeSunTimes(lat, lng);
  const now = new Date();
  const m = now.getUTCHours() * 60 + now.getUTCMinutes();
  return m >= rise && m < set;
}

// client-side rate limit (5 queries / 30 days)
const RL_KEY = 'gst_rl_count', RL_RESET_KEY = 'gst_rl_reset';
function getQueryUsage() {
  const reset = parseInt(localStorage.getItem(RL_RESET_KEY) || '0', 10);
  if (Date.now() > reset) {
    localStorage.setItem(RL_KEY, '0');
    localStorage.setItem(RL_RESET_KEY, String(Date.now() + 30*24*60*60*1000));
  }
  return parseInt(localStorage.getItem(RL_KEY) || '0', 10);
}
function incQueryUsage() { localStorage.setItem(RL_KEY, String(getQueryUsage() + 1)); }

<script type="text/babel" data-presets="react">

function Meta({ T, label, dot }) {
  const mono = `'IBM Plex Mono',monospace`;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8, fontFamily:mono, fontSize:12, color:T.text3, letterSpacing:'0.06em' }}>

}

function Pill({ T, label, accent, muted, onClick }) {
  const border = accent ? T.accent2 : muted ? T.border : T.border;
  const color  = accent ? T.accent  : muted ? T.text3  : T.text2;
  return (
    <span onClick={onClick} style={{
      fontFamily:`'IBM Plex Mono',monospace`, fontSize:12, padding:'6px 12px',
      border:`1px ${muted ? 'dashed' : 'solid'} ${border}`,

}

function SectionLabel({ T, children, fs=9 }) {

}

function Sparkline({ data, color, bg, h=24, w=80, stroke=1, dots=false }) {
  const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
  const pts = data.map((v,i) => [i/(data.length-1)*w, h-((v-min)/range)*(h-4)-2]);
  const d = pts.map((p,i) => `${i===0?'M':'L'} ${p[0]} ${p[1]}`).join(' ');
  return (
    <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width:'100%', height:h, background:bg }}>
      <path d={d} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"/>
      {dots && pts.map((p,i) => <circle key={i} cx={p[0]} cy={p[1]} r={i===pts.length-1?2.4:1.2} fill={color}/>)}
    </svg>
  );
}

function HistoryChart({ T, c, data, events }) {
  const W=100, H=100, min=Math.min(...data)-4, max=Math.max(...data)+4, range=max-min;
  const pts = data.map((v,i) => [i/(data.length-1)*W, H-((v-min)/range)*H]);
  const d = pts.map((p,i) => `${i===0?'M':'L'} ${p[0]} ${p[1]}`).join(' ');
  const eventXs = events.map((_,i) => 10 + i*18);
  return (
    <div style={{ position:'relative', height:180, background:T.bg2, border:`1px solid ${T.border}` }}>
      <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ width:'100%', height:'100%' }}>
        {[25,50,75].map(y => <line key={y} x1="0" y1={H-((y-min)/range)*H} x2="100" y2={H-((y-min)/range)*H} stroke={T.border} strokeWidth="0.3" strokeDasharray="1 1"/>)}
        <line x1="0" y1={H-((50-min)/range)*H} x2="100" y2={H-((50-min)/range)*H} stroke={T.accent2} strokeWidth="0.4"/>
        <path d={`${d} L ${W} ${H} L 0 ${H} Z`} fill={c} fillOpacity="0.12"/>
        <path d={d} fill="none" stroke={c} strokeWidth="0.7" vectorEffect="non-scaling-stroke"/>
        {events.map((_,i) => {
          const x=eventXs[i], idx=Math.round((x/W)*(data.length-1)), y=pts[idx][1];
          return <circle key={i} cx={x} cy={y} r="1.2" fill={T.accent} stroke={T.bg2} strokeWidth="0.4" vectorEffect="non-scaling-stroke"/>;
        })}
      </svg>
      <div style={{ position:'absolute', left:6, top:4, fontFamily:`'IBM Plex Mono',monospace`, fontSize:8.5, color:T.text3 }}>{Math.round(max)}%</div>
      <div style={{ position:'absolute', left:6, bottom:4, fontFamily:`'IBM Plex Mono',monospace`, fontSize:8.5, color:T.text3 }}>{Math.round(min)}%</div>
      <div style={{ position:'absolute', left:0, bottom:-16, fontFamily:`'IBM Plex Mono',monospace`, fontSize:8.5, color:T.text3 }}>MAY 2024</div>
      <div style={{ position:'absolute', right:0, bottom:-16, fontFamily:`'IBM Plex Mono',monospace`, fontSize:8.5, color:T.text3 }}>MAY 2026</div>
    </div>
  );
}

  const T = GST_THEME[tweak.dark?'dark':'light'];

  const [activeId, setActiveId] = React.useState(predictions[0].id);
  const [filter, setFilter] = React.useState('all');
  const [query, setQuery] = React.useState('');
  const [askState, setAskState] = React.useState('idle');
  const [queryCount, setQueryCount] = React.useState(getQueryUsage());

  const filtered = predictions.filter(p => {
    if (filter==='all') return true;
    if (filter==='council') return p.horizon_days <= 90;
    if (filter==='budget') return p.horizon_days > 90 && p.horizon_days <= 200;
    if (filter==='high') return p.probability >= 70;
    if (filter==='movers') return Math.abs(p.delta||0) >= 5;
    return true;
  });
  const active = predictions.find(p => p.id === activeId) || predictions[0];
  const probColor = (p) => p.probability >= 70 ? T.danger : p.probability >= 50 ? T.warn : T.success;

  const onAsk = async () => {
    if (query.trim().length < 4) return;
    if (queryCount >= 5) { onViewPricing && onViewPricing(); return; }
    setAskState('loading');
    incQueryUsage();
    setQueryCount(c => c + 1);
    try {
      const res = await fetch('/api/query', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ query:query.trim() }) });
      const data = await res.json();
      const responseObj = data.error
        ? { loading:false, errorMsg: data.message || 'An error occurred.' }
        : { loading:false, answer:data.answer, sources:(data.sources||[]).map(s=>s.source_id||String(s)) };
      onViewQuery && onViewQuery({ query:query.trim(), response:responseObj });

                <div key={p.id}
                  onClick={() => { setActiveId(p.id); onViewPrediction && onViewPrediction(p); }}
                  style={{ display:'grid', gridTemplateColumns:'48px 1fr 50px 72px 96px 80px', alignItems:'center', padding:tweak.density==='compact'?'8px 16px':'13px 16px', borderBottom:`1px solid ${T.border}`, background:isActive?(tweak.dark?'rgba(200,184,106,0.06)':'rgba(154,138,58,0.08)'):'transparent', borderLeft:isActive?`2px solid ${T.accent}`:`2px solid transparent`, cursor:'pointer', transition:'background .12s' }}>
                  <div style={{ fontFamily:mono, fontSize:tx.id, color:T.text3, letterSpacing:'0.04em' }}>{p.id}</div>
                  <div>
                    <div style={{ fontSize:tx.topic, fontWeight:500, color:isActive?T.accent:T.text, lineHeight:1.3, marginBottom:2 }}>{p.topic_label}</div>
                    <div style={{ fontFamily:mono, fontSize:tx.changeType, color:T.text3, letterSpacing:'0.06em', textTransform:'uppercase' }}>{p.change_type}</div>
                  </div>
                  <div style={{ textAlign:'right', fontFamily:mono, fontSize:tx.delta, color:(p.delta||0)>0?T.danger:(p.delta||0)<0?T.success:T.text3 }}>{fmtDelta(p.delta||0)}</div>
                  <div style={{ textAlign:'right' }}>
                    <div style={{ fontFamily:mono, fontSize:tx.probBig, color:c, fontWeight:600, lineHeight:1 }}>{p.probability}<span style={{ fontSize:tx.probPct, color:T.text3 }}>%</span></div>
                    <div style={{ height:2, background:T.bg3, marginTop:4 }}>
                      <div style={{ height:'100%', width:`${p.probability}%`, background:c }}/>
                    </div>
                  </div>
                  <div style={{ fontFamily:mono, fontSize:tx.horizon, color:T.text2, letterSpacing:'0.04em' }}>{p.horizon_label}</div>
                  <Sparkline data={p.spark||[p.probability]} color={c} bg="transparent" h={tx.spark}/>
                </div>
              );
            })}
          </div>
        </div>

        {/* SIGNAL DETAIL */}
        <div style={{ overflowY:'auto', minHeight:0 }}>
          <RuleLabel T={T}
            title={<>Signal breakdown <span style={{ color:T.text3, marginLeft:8 }}>·</span> <span style={{ color:T.accent2, marginLeft:8 }}>{active.id}</span></>}
          />
          <div style={{ padding:16 }}>
            <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
              <div style={{ fontFamily:mono, fontSize:sx.probBig, color:probColor(active), fontWeight:600, lineHeight:1 }}>{active.probability}%</div>
              <div style={{ fontFamily:mono, fontSize:sx.probLab, color:T.text3, letterSpacing:'0.1em' }}>PROBABILITY</div>
            </div>
            <div style={{ fontSize:sx.topic, color:T.text, fontWeight:500, marginTop:10, lineHeight:1.3 }}>{active.topic_label}</div>
            <div style={{ fontFamily:mono, fontSize:sx.horizon, color:T.accent, letterSpacing:'0.06em', marginTop:4 }}>⏳ {active.horizon_label}</div>
            <div style={{ display:'flex', gap:12, marginTop:12, paddingTop:12, borderTop:`1px solid ${T.border}` }}>
              <Stat T={T} fs={{lab:sx.statLab, val:sx.statVal}} label="Δ 30 days" value={fmtDelta(active.delta||0)} accent={(active.delta||0)>0?T.danger:T.success}/>
              <Stat T={T} fs={{lab:sx.statLab, val:sx.statVal}} label="Signals" value={active.signals.length}/>
              <Stat T={T} fs={{lab:sx.statLab, val:sx.statVal}} label="Change" value={active.change_type}/>
            </div>

            <div style={{ marginTop:16 }}>
              <SectionLabel T={T} fs={sx.section}>12-WEEK PROBABILITY</SectionLabel>
              <div style={{ background:T.bg2, border:`1px solid ${T.border}`, padding:10, height:60 }}>
                <Sparkline data={active.spark||[active.probability]} color={T.accent} bg="transparent" h={40} stroke={1.5} dots/>
              </div>
            </div>

            <SectionLabel T={T} fs={sx.section}>SIGNALS</SectionLabel>
            {active.signals.map((s,i) => (
              <div key={i} style={{ background:T.bg2, border:`1px solid ${T.border}`, padding:9, marginBottom:6 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:4 }}>
                  <div style={{ fontFamily:mono, fontSize:sx.sigType, color:T.accent2, letterSpacing:'0.08em', textTransform:'uppercase' }}>{GST_SIGNAL_LABEL[s.type]||s.type}</div>
                  <div style={{ fontFamily:mono, fontSize:sx.sigStr, color:T.accent }}>{Math.round(s.strength*100)}%</div>
                </div>
                <div style={{ height:2, background:T.bg3, marginBottom:6 }}>
                  <div style={{ height:'100%', width:`${s.strength*100}%`, background:T.accent, opacity:0.8 }}/>
                </div>
                <div style={{ fontSize:sx.sigDesc, color:T.text2, lineHeight:1.55 }}>{s.description}</div>
                <div style={{ display:'flex', flexWrap:'wrap', gap:3, marginTop:6 }}>
                  {(s.docs||[]).slice(0,4).map(d => <span key={d} style={{ fontFamily:mono, fontSize:sx.docChip, padding:'1px 4px', border:`1px solid ${T.border}`, color:T.text3 }}>{d}</span>)}
                  {(s.docs||[]).length>4 && <span style={{ fontFamily:mono, fontSize:sx.docChip, color:T.text3 }}>+{s.docs.length-4}</span>}
                </div>
              </div>
            ))}

            <SectionLabel T={T} fs={sx.section}>WHAT TO WATCH</SectionLabel>
            <div style={{ fontSize:sx.watchBody, color:T.text2, lineHeight:1.7, background:T.bg2, border:`1px solid ${T.border}`, padding:9 }}>{active.watch}</div>

            <div style={{ display:'flex', gap:5, marginTop:12 }}>
              <button onClick={() => onViewAlert && onViewAlert(active)} style={{ fontFamily:mono, fontSize:sx.btn, padding:'6px 10px', border:`1px solid ${T.accent2}`, color:T.accent, background:'transparent', cursor:'pointer', letterSpacing:'0.08em', flex:1 }}>+ ALERT ME</button>
              <button onClick={onViewPricing} style={{ fontFamily:mono, fontSize:sx.btn, padding:'6px 10px', border:`1px solid ${T.border2}`, color:T.text2, background:'transparent', cursor:'pointer', letterSpacing:'0.08em' }}>↓ REPORT</button>
              <button onClick={() => onViewPrediction && onViewPrediction(active)} style={{ fontFamily:mono, fontSize:sx.btn, padding:'6px 10px', border:`1px solid ${T.border2}`, color:T.text2, background:'transparent', cursor:'pointer', letterSpacing:'0.08em' }}>↗</button>
            </div>
          </div>
        </div>
      </div>

      {/* TIER 3 — query dock: centered, floats above content with upward shadow */}
      <div style={{ background:chromeBg, flexShrink:0, position:'relative', borderTop:chromeEdge, boxShadow:tweak.dark?`0 -8px 24px rgba(0,0,0,0.35), inset 0 -1px 0 rgba(255,255,255,0.03)`:`0 -8px 24px rgba(0,0,0,0.06), inset 0 -1px 0 rgba(0,0,0,0.04)`, zIndex:4 }}>
        <div style={{ position:'absolute', top:-2, left:'50%', transform:'translateX(-50%)', width:80, height:2, background:T.accent }}/>
        <div style={{ maxWidth:920, margin:'0 auto', padding:'16px 24px 14px', display:'flex', flexDirection:'column', gap:10, position:'relative' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <span style={{ fontFamily:mono, fontSize:11, color:T.accent, letterSpacing:'0.18em', textTransform:'uppercase' }}>● Ask the corpus</span>
            <span style={{ fontFamily:mono, fontSize:10.5, color:T.text3, letterSpacing:'0.04em' }}>
              <span style={{ color:T.accent }}>{Math.max(0,5-queryCount)}</span> / 5 free queries this month
            </span>
          </div>
          <div style={{ display:'flex', alignItems:'stretch', border:`1px solid ${T.border2}`, background:T.bg, boxShadow:tweak.dark?`inset 0 1px 0 rgba(0,0,0,0.3)`:`inset 0 1px 0 rgba(0,0,0,0.04)` }}>
            <span style={{ fontFamily:mono, fontSize:13, color:T.accent, padding:'0 14px', display:'flex', alignItems:'center', borderRight:`1px solid ${T.border}`, letterSpacing:'0.1em' }}>›</span>
            <input
              value={query} onChange={e => setQuery(e.target.value)}
              onKeyDown={e => { if (e.key==='Enter') onAsk(); }}
              placeholder="What's the outlook for ITC on marketing expenses?"
              style={{ flex:1, background:'transparent', border:'none', outline:'none', fontFamily:sans, fontSize:15, color:T.text, padding:'12px 14px', caretColor:T.accent }}
            />
            <span style={{ fontFamily:mono, fontSize:10, color:T.text3, padding:'0 12px', display:'flex', alignItems:'center', letterSpacing:'0.06em' }}>{query.length}/500</span>
            <button onClick={onAsk} disabled={askState==='loading'} style={{ fontFamily:mono, fontSize:11, letterSpacing:'0.14em', textTransform:'uppercase', color:T.bg, background:askState==='loading'?T.border2:T.accent2, border:'none', padding:'0 24px', cursor:askState==='loading'?'wait':'pointer' }}>
              {askState==='loading'?'Analysing…':'Analyse →'}
            </button>
          </div>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8, flexWrap:'wrap' }}>
            <span style={{ fontFamily:mono, fontSize:9.5, color:T.text3, letterSpacing:'0.12em', textTransform:'uppercase', marginRight:4 }}>Try</span>
            {[
              "What's the outlook for ITC on marketing expenses?",
              "Will GST on co-working spaces change soon?",
              "Risk of RCM expansion to digital platforms?",
              "Is Section 16(4) likely to be liberalised?",
              "Is e-invoicing threshold dropping to ₹1 cr?",
            ].map(s => (
              <button key={s} onClick={() => setQuery(s)} style={{ fontFamily:mono, fontSize:10, padding:'4px 9px', background:T.bg, border:`1px solid ${T.border}`, color:T.text2, cursor:'pointer', letterSpacing:'0.04em' }}>{s.length>38?s.slice(0,36)+'…':s}</button>
            ))}
          </div>
        </div>
      </div>

      <style>{`
        @keyframes gstTicker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
        @keyframes gstBlink  { 50%{opacity:0.3} }
      `}</style>
    </div>
  );
}

// ── Normalize live predictions ────────────────────────────────────────────────
function normalizePrediction(p, i) {
  const prob = p.probability || 50;
  const baseline = Math.round(prob * 0.7);
  const spark = p.spark || Array.from({ length:12 }, (_,j) => Math.round(baseline + (prob - baseline) * j / 11));
  return {
    id: p.id || `P-${2614 - i*5}`,
    topic_id: p.topic_id,
    topic_label: p.topic_label,
    change_type: p.change_type || 'Rule change',
    probability: prob,
    delta: p.delta || 0,
    horizon_label: p.horizon_label || '2–3 quarters',
    horizon_days: p.horizon_days || 270,
    spark,
    signals: p.signals || [],
    watch: p.watch || 'Monitor CBIC notifications and next GST Council agenda.',
    generated_at: p.generated_at,
  };
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [dark, setDark] = React.useState(() => !isDayTime());
  const [density, setDensity] = React.useState('comfy');
  const [screen, setScreen] = React.useState(null);
  const [activePrediction, setActivePrediction] = React.useState(null);
  const [queryContext, setQueryContext] = React.useState(null);
  const [livePredictions, setLivePredictions] = React.useState(null);
  const [liveData, setLiveData] = React.useState(null);
  const manualOverride = React.useRef(false);

  // Auto dark/light: init with geolocation, re-check every 60s near sunrise/sunset.
  React.useEffect(() => {
    let lat = 20, lng = 78;
    const apply = () => { if (!manualOverride.current) setDark(!isDayTime(lat, lng)); };
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => { lat = pos.coords.latitude; lng = pos.coords.longitude; apply(); },
        apply
      );
    } else { apply(); }
    const timer = setInterval(apply, 60000);
    return () => clearInterval(timer);
  }, []);

  React.useEffect(() => {
    fetch('./data/predictions/latest.json?_=' + Date.now())
      .then(r => r.json())
      .then(data => {
        if (data?.predictions?.length > 0 && data.doc_count > 0) {
          setLivePredictions(data.predictions.map(normalizePrediction));
          setLiveData(data);
        }
      })
      .catch(() => {});
  }, []);

  const tweak = { dark, density };
  const predictions = livePredictions || GST_PREDICTIONS;
  const T = GST_THEME[dark?'dark':'light'];

  const goBack = () => setScreen(null);
  const goAlert = (p) => { setActivePrediction(p); setScreen('alert'); };
  const goPrediction = (p) => { setActivePrediction(p); setScreen('prediction'); };
  const goQuery = (ctx) => { setQueryContext(ctx); setScreen('query'); };
  const toggleDark = () => { manualOverride.current = true; setDark(d => !d); };

  const shell = (child) => <div style={{ width:'100vw', height:'100vh', background:T.bg }}>{child}</div>;

  if (screen === 'query') return shell(<ScreenQueryResponse tweak={tweak} onBack={goBack} onViewPricing={() => setScreen('pricing')} response={queryContext?.response} query={queryContext?.query}/>);
  if (screen === 'prediction') return shell(<ScreenPredictionDetail tweak={tweak} onBack={goBack} onViewPricing={() => setScreen('pricing')} onViewAlert={() => goAlert(activePrediction)} prediction={activePrediction}/>);
  if (screen === 'source') return shell(<ScreenSourceDoc tweak={tweak} onBack={goBack} onViewPricing={() => setScreen('pricing')}/>);
  if (screen === 'alert') return shell(<ScreenAlertSetup tweak={tweak} onBack={goBack} onViewPricing={() => setScreen('pricing')} prediction={activePrediction}/>);
  if (screen === 'pricing') return shell(<ScreenPricing tweak={tweak} onBack={goBack}/>);

  return (
    <div style={{ width:'100vw', height:'100vh', background:T.bg }}>
      <DirectionA
        tweak={tweak}
        predictions={predictions}
        liveData={liveData}
        onViewQuery={goQuery}
        onViewPrediction={goPrediction}
        onViewSource={() => setScreen('source')}
        onViewAlert={(p) => goAlert(p)}
        onViewPricing={() => setScreen('pricing')}
        onToggleDark={toggleDark}
        onToggleDensity={() => setDensity(d => d==='comfy'?'compact':'comfy')}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
